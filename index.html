<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Pass Demo | Exclusive Club</title>
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #050505;
            --card-grad: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
        }

        body {
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container { padding: 40px 20px; max-width: 400px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; letter-spacing: 1px; }
        p { color: #888; margin-bottom: 30px; font-size: 0.95rem; }

        /* QR CODE - Caricamento diretto senza script */
        .qr-section {
            background: #fff;
            padding: 15px;
            display: inline-block;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .pass-card {
            width: 100%;
            max-width: 320px;
            height: 190px;
            background: var(--card-grad);
            border-radius: 20px;
            border: 1px solid #444;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            margin: 0 auto 40px auto;
            position: relative;
            padding: 20px;
            box-sizing: border-box;
        }

        .pass-card::after {
            content: "VIP MEMBER";
            position: absolute;
            top: 20px; right: 20px;
            font-size: 10px; letter-spacing: 3px;
            color: var(--gold); font-weight: bold;
        }

        .points { font-size: 28px; font-weight: bold; margin-top: 10px; }
        .progress-bar { width: 100%; height: 6px; background: #444; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .progress-fill { width: 65%; height: 100%; background: var(--gold); }

        .btn {
            background-color: #fff; color: #000;
            padding: 18px 35px; border-radius: 50px;
            text-decoration: none; font-weight: bold;
            display: inline-flex; align-items: center; gap: 12px;
        }

        /* Mostra/Nascondi QR in base al dispositivo */
        @media (max-width: 768px) { .qr-section { display: none; } }
    </style>
</head>
<body>

    <div class="container">
        <h1>Exclusive VIP Club</h1>
        <p>Inquadra il QR Code con il tuo telefono o clicca il pulsante sotto per aggiungere la tessera al Wallet.</p>

        <div class="qr-section">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://github.com" alt="QR Code">
        </div>

        <div class="pass-card">
            <div style="text-align: left;">
                <div style="font-size: 12px; color: #888;">Status Attuale</div>
                <div class="points">1.250 Punti</div>
            </div>
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <div style="font-size: 11px; color: var(--gold); margin-top: 8px; text-align: right;">MANCANO 2 VISITE AL PREMIO</div>
        </div>

        <a href="#" class="btn" onclick="alert('Demo: Il pass verrebbe aggiunto ora al tuo Wallet!')">
            Aggiungi al Wallet
        </a>
    </div>

</body>
</html>
